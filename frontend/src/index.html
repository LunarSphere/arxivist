<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arxivist Search</title>
    <link rel="stylesheet" href="/styles.css" />
    <script defer src="/config.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <nav class="top-links" aria-label="Site links">
      <a href="https://arxiv.org/" rel="noreferrer">arXiv</a>
      <a href="https://books.toscrape.com/" rel="noreferrer">Demo Crawl</a>
      <a href="https://catppuccin.com/" rel="noreferrer">Mocha</a>
    </nav>

    <main class="shell">
      <section class="search-panel" aria-labelledby="page-title">
        <div class="masthead">
          <h1 id="page-title" class="logo" aria-label="Arxivist">
            <span>A</span><span>r</span><span>x</span><span>i</span><span>v</span><span>i</span><span>s</span><span>t</span>
          </h1>
          <p id="index-status" class="status">Checking index...</p>
        </div>

        <form id="search-form" class="search-form">
          <label class="visually-hidden" for="query">Search query</label>
          <input id="query" name="query" type="search" placeholder="book mystery" autocomplete="off" required />
          <button type="submit">Arxivist Search</button>
        </form>

        <p id="message" class="message" role="status"></p>
      </section>

      <section class="results-shell" aria-label="Search results">
        <ol id="results" class="results"></ol>
      </section>
    </main>
  </body>
</html>
